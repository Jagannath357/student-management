<div [class.dark-theme]="isDarkMode" class="login-page-root">

    <!-- Global Application Shared Navbar Module -->
    <app-navbar></app-navbar>

    <!-- Login Main Workspace Viewport -->
    <div class="auth-container">
        <mat-card class="auth-card mat-elevation-z4">
            <mat-card-header class="auth-header">
                <div class="brand-badge login-badge">
                    <mat-icon>school</mat-icon>
                </div>
                <mat-card-title>Account Sign In</mat-card-title>
                <mat-card-subtitle>Student Course Management System</mat-card-subtitle>
            </mat-card-header>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
                <mat-card-content class="auth-content">

                    <!-- Username Input Field -->
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Username</mat-label>
                        <input matInput formControlName="username" type="text" placeholder="Enter username" required />
                        <mat-icon matSuffix>person</mat-icon>
                        <mat-error *ngIf="loginForm.get('username')?.hasError('required')">Username path is
                            mandatory.</mat-error>
                    </mat-form-field>

                    <!-- Password Input Field -->
                    <mat-form-field appearance="outline" class="full-width">
                        <mat-label>Password</mat-label>
                        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'"
                            placeholder="Enter password" required />
                        <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                            [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hidePassword">
                            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                        </button>
                        <mat-error *ngIf="loginForm.get('password')?.hasError('required')">Password input is
                            mandatory.</mat-error>
                    </mat-form-field>

                </mat-card-content>

                <mat-card-actions class="auth-actions">
                    <button mat-raised-button color="primary" class="submit-btn" type="submit"
                        [disabled]="loginForm.invalid">
                        Sign In <mat-icon>login</mat-icon>
                    </button>

                    <div class="auth-navigation-link">
                        <span>New administrator?</span>
                        <button type="button" mat-button color="accent" routerLink="/signup">Create account</button>
                    </div>
                </mat-card-actions>
            </form>
        </mat-card>
    </div>

    <!-- Global Application Shared Footer Module -->
    <app-footer></app-footer>

</div>
